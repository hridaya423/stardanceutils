name: Publish Stores

on:
  push:
    branches: [main]
    paths:
      - manifest.json
      - manifest_firefox.json
  workflow_dispatch:
    inputs:
      publish_chrome:
        description: Publish to Chrome Web Store
        required: true
        default: true
        type: boolean
      publish_firefox:
        description: Publish to Firefox Add-ons
        required: true
        default: true
        type: boolean
      publish_safari:
        description: Upload Safari build to TestFlight
        required: true
        default: false
        type: boolean
      safari_build_number:
        description: Optional Safari TestFlight build number. Defaults to GitHub run number.
        required: false
        default: ''
        type: string
      firefox_release_notes:
        description: Optional Firefox release notes (en-US)
        required: false
        default: ''
        type: string
      firefox_approval_notes:
        description: Optional reviewer notes for Firefox
        required: false
        default: ''
        type: string

jobs:
  preflight:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    outputs:
      manifest_version: ${{ steps.preflight.outputs.manifest_version }}
      publish_version: ${{ steps.preflight.outputs.publish_version }}
      source_commit: ${{ steps.preflight.outputs.source_commit }}
      publish_chrome: ${{ steps.preflight.outputs.publish_chrome }}
      publish_firefox: ${{ steps.preflight.outputs.publish_firefox }}
      publish_safari: ${{ steps.preflight.outputs.publish_safari }}
      chrome_blocked_pending: ${{ steps.preflight.outputs.chrome_blocked_pending }}
      firefox_blocked_pending: ${{ steps.preflight.outputs.firefox_blocked_pending }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - id: chrome-auth
        if: ${{ (github.event_name != 'workflow_dispatch' || inputs.publish_chrome) && vars.CHROME_GCP_WORKLOAD_IDENTITY_PROVIDER != '' && vars.CHROME_GCP_SERVICE_ACCOUNT != '' }}
        uses: google-github-actions/auth@v3
        with:
          token_format: access_token
          access_token_scopes: https://www.googleapis.com/auth/chromewebstore
          workload_identity_provider: ${{ vars.CHROME_GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.CHROME_GCP_SERVICE_ACCOUNT }}

      - id: preflight
        env:
          PUBLISH_CHROME: ${{ github.event_name == 'workflow_dispatch' && (inputs.publish_chrome && 'true' || 'false') || 'true' }}
          PUBLISH_FIREFOX: ${{ github.event_name == 'workflow_dispatch' && (inputs.publish_firefox && 'true' || 'false') || 'true' }}
          PUBLISH_SAFARI: ${{ github.event_name == 'workflow_dispatch' && (inputs.publish_safari && 'true' || 'false') || 'true' }}
          CHROME_ACCESS_TOKEN: ${{ steps.chrome-auth.outputs.access_token || secrets.CHROME_ACCESS_TOKEN }}
          CHROME_PUBLISHER_ID: ${{ vars.CHROME_PUBLISHER_ID }}
          CHROME_EXTENSION_ID: ${{ vars.CHROME_EXTENSION_ID }}
          AMO_API_KEY: ${{ secrets.AMO_API_KEY }}
          AMO_API_SECRET: ${{ secrets.AMO_API_SECRET }}
          FIREFOX_ADDON_REF: ${{ vars.FIREFOX_ADDON_REF }}
        run: node scripts/store-publish.js preflight

  build:
    needs: preflight
    if: ${{ needs.preflight.outputs.publish_chrome == 'true' || needs.preflight.outputs.publish_firefox == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build selected store packages
        env:
          SOURCE_COMMIT: ${{ needs.preflight.outputs.source_commit }}
          PUBLISH_VERSION: ${{ needs.preflight.outputs.publish_version }}
          PUBLISH_CHROME: ${{ needs.preflight.outputs.publish_chrome }}
          PUBLISH_FIREFOX: ${{ needs.preflight.outputs.publish_firefox }}
        run: |
          mkdir -p build/source build/store/chrome/themes build/store/firefox/themes
          git archive "$SOURCE_COMMIT" | tar -x -C build/source
          if [ -f build/source/scripts/validate-extension-package.js ]; then
            (cd build/source && node scripts/validate-extension-package.js)
          fi

          if [ "$PUBLISH_CHROME" = "true" ]; then
            cp build/source/manifest.json build/source/shared.js build/source/themes.js build/source/sidebar.js build/source/ai-check.js build/source/shop.js build/source/projects.js build/source/settings.js build/source/content.js build/source/background.js build/source/onboarding.js build/source/command-palette.js build/source/openai-verify.js build/source/styles.css build/store/chrome/
            cp build/source/icon*.png build/store/chrome/ 2>/dev/null || true
            cp build/source/themes/*.css build/store/chrome/themes/
            node scripts/store-publish.js stamp-manifest-version build/store/chrome/manifest.json "$PUBLISH_VERSION"
            (cd build/store/chrome && zip -r "../../../stardance-utils-chrome-v${PUBLISH_VERSION}.zip" .)
          fi

          if [ "$PUBLISH_FIREFOX" = "true" ]; then
            cp build/source/manifest_firefox.json build/store/firefox/manifest.json
            cp build/source/shared.js build/source/themes.js build/source/sidebar.js build/source/ai-check.js build/source/shop.js build/source/projects.js build/source/settings.js build/source/content.js build/source/background.js build/source/onboarding.js build/source/command-palette.js build/source/openai-verify.js build/source/styles.css build/store/firefox/
            cp build/source/icon*.png build/store/firefox/ 2>/dev/null || true
            cp build/source/themes/*.css build/store/firefox/themes/
            node scripts/store-publish.js stamp-manifest-version build/store/firefox/manifest.json "$PUBLISH_VERSION"
            (cd build/store/firefox && zip -r "../../../stardance-utils-firefox-v${PUBLISH_VERSION}.xpi" .)
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: store-packages-v${{ needs.preflight.outputs.publish_version }}
          path: stardance-utils-*-v${{ needs.preflight.outputs.publish_version }}.*
          if-no-files-found: error

  publish-chrome:
    needs: [preflight, build]
    if: ${{ needs.preflight.outputs.publish_chrome == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/download-artifact@v4
        with:
          name: store-packages-v${{ needs.preflight.outputs.publish_version }}
          path: .

      - id: chrome-auth
        if: ${{ vars.CHROME_GCP_WORKLOAD_IDENTITY_PROVIDER != '' && vars.CHROME_GCP_SERVICE_ACCOUNT != '' }}
        uses: google-github-actions/auth@v3
        with:
          token_format: access_token
          access_token_scopes: https://www.googleapis.com/auth/chromewebstore
          workload_identity_provider: ${{ vars.CHROME_GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.CHROME_GCP_SERVICE_ACCOUNT }}

      - name: Submit Chrome update
        env:
          PUBLISH_VERSION: ${{ needs.preflight.outputs.publish_version }}
          CHROME_ACCESS_TOKEN: ${{ steps.chrome-auth.outputs.access_token || secrets.CHROME_ACCESS_TOKEN }}
          CHROME_PUBLISHER_ID: ${{ vars.CHROME_PUBLISHER_ID }}
          CHROME_EXTENSION_ID: ${{ vars.CHROME_EXTENSION_ID }}
          CHROME_PACKAGE_PATH: stardance-utils-chrome-v${{ needs.preflight.outputs.publish_version }}.zip
        run: node scripts/store-publish.js publish-chrome

  publish-firefox:
    needs: [preflight, build]
    if: ${{ needs.preflight.outputs.publish_firefox == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/download-artifact@v4
        with:
          name: store-packages-v${{ needs.preflight.outputs.publish_version }}
          path: .

      - name: Submit Firefox update
        env:
          PUBLISH_VERSION: ${{ needs.preflight.outputs.publish_version }}
          AMO_API_KEY: ${{ secrets.AMO_API_KEY }}
          AMO_API_SECRET: ${{ secrets.AMO_API_SECRET }}
          FIREFOX_ADDON_REF: ${{ vars.FIREFOX_ADDON_REF }}
          FIREFOX_PACKAGE_PATH: stardance-utils-firefox-v${{ needs.preflight.outputs.publish_version }}.xpi
          FIREFOX_RELEASE_NOTES: ${{ github.event_name == 'workflow_dispatch' && inputs.firefox_release_notes || '' }}
          FIREFOX_APPROVAL_NOTES: ${{ github.event_name == 'workflow_dispatch' && inputs.firefox_approval_notes || '' }}
        run: node scripts/store-publish.js publish-firefox

  publish-safari:
    needs: preflight
    if: ${{ needs.preflight.outputs.publish_safari == 'true' }}
    runs-on: macos-15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Extract lagged publish source
        env:
          SOURCE_COMMIT: ${{ needs.preflight.outputs.source_commit }}
        run: |
          mkdir -p build/source
          git archive "$SOURCE_COMMIT" | tar -x -C build/source

      - name: Validate extension source
        working-directory: build/source
        run: node scripts/validate-extension-package.js

      - name: Prepare App Store Connect API key
        env:
          ASC_API_KEY_P8: ${{ secrets.ASC_API_KEY_P8 }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
        run: |
          mkdir -p "$RUNNER_TEMP/asc"
          KEY_PATH="$RUNNER_TEMP/asc/AuthKey_${ASC_KEY_ID}.p8"
          printf '%s' "$ASC_API_KEY_P8" > "$KEY_PATH"
          chmod 600 "$KEY_PATH"
          echo "ASC_KEY_PATH=$KEY_PATH" >> "$GITHUB_ENV"

      - name: Regenerate Safari project
        working-directory: build/source
        env:
          SAFARI_BUILD_NUMBER: ${{ inputs.safari_build_number != '' && inputs.safari_build_number || github.run_number }}
          SAFARI_MACOS_DEPLOYMENT_TARGET: '14.0'
        run: |
          node scripts/prepare-safari-project.js
          VALIDATE_SAFARI_SOURCE=true node scripts/validate-extension-package.js

      - name: Archive Safari app
        working-directory: build/source
        env:
          APPLE_TEAM_ID: ${{ vars.APPLE_TEAM_ID }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          SAFARI_SCHEME: ${{ vars.SAFARI_SCHEME }}
        run: |
          PROJECT_PATH="safari/Stardance Utils Safari/Stardance Utils Safari.xcodeproj"
          SCHEME="${SAFARI_SCHEME:-Stardance Utils Safari}"
          ARCHIVE_PATH="$GITHUB_WORKSPACE/build/safari/StardanceUtilsSafari.xcarchive"
          xcodebuild -version
          xcodebuild \
            -project "$PROJECT_PATH" \
            -scheme "$SCHEME" \
            -configuration Release \
            -archivePath "$ARCHIVE_PATH" \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            CODE_SIGN_STYLE=Automatic \
            MACOSX_DEPLOYMENT_TARGET=14.0 \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$ASC_KEY_PATH" \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID" \
            archive
          echo "SAFARI_ARCHIVE_PATH=$ARCHIVE_PATH" >> "$GITHUB_ENV"

      - name: Upload to TestFlight
        env:
          APPLE_TEAM_ID: ${{ vars.APPLE_TEAM_ID }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          EXPORT_PATH="$GITHUB_WORKSPACE/build/safari/export"
          EXPORT_OPTIONS="$RUNNER_TEMP/ExportOptions.plist"
          mkdir -p "$EXPORT_PATH"
          cat > "$EXPORT_OPTIONS" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>destination</key>
            <string>upload</string>
            <key>teamID</key>
            <string>${APPLE_TEAM_ID}</string>
            <key>signingStyle</key>
            <string>automatic</string>
            <key>manageAppVersionAndBuildNumber</key>
            <false/>
          </dict>
          </plist>
          EOF
          xcodebuild \
            -exportArchive \
            -archivePath "$SAFARI_ARCHIVE_PATH" \
            -exportPath "$EXPORT_PATH" \
            -exportOptionsPlist "$EXPORT_OPTIONS" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$ASC_KEY_PATH" \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: safari-testflight-build-${{ github.run_number }}
          path: |
            build/safari
          if-no-files-found: ignore
          retention-days: 14

  pending-summary:
    needs: preflight
    if: ${{ needs.preflight.outputs.chrome_blocked_pending == 'true' || needs.preflight.outputs.firefox_blocked_pending == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Report pending store reviews
        run: |
          echo "Store publishing is partially blocked by pending review." >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Chrome blocked by pending review: ${{ needs.preflight.outputs.chrome_blocked_pending }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Firefox blocked by pending review: ${{ needs.preflight.outputs.firefox_blocked_pending }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Re-run the workflow later after the blocked store finishes review." >> "$GITHUB_STEP_SUMMARY"
